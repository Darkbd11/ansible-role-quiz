---
# tasks/main.yaml - Point d'entrée des tâches du rôle ansible-role-BoulayeLeBg

- name: Afficher les informations de la machine
  ansible.builtin.debug:
    msg: "Deploiement de quiz-ansible sur {{ ansible_hostname }} - {{ ansible_distribution }} {{ ansible_distribution_version }}"

- name: Inclure les taches specifiques a la distribution
  ansible.builtin.include_tasks: "{{ ansible_os_family | lower }}.yaml"

- name: Cloner le depot Git de quiz-ansible
  ansible.builtin.git:
    repo: "{{ quiz_repo }}"
    dest: "{{ quiz_app_dir }}"
    version: "{{ quiz_repo_branch }}"
    force: true

- name: Installer les dependances npm
  ansible.builtin.shell: npm install
  args:
    chdir: "{{ quiz_app_dir }}"
  changed_when: true

- name: Compiler l'application (npm run build)
  ansible.builtin.shell: npm run build
  args:
    chdir: "{{ quiz_app_dir }}"
  changed_when: true
  notify: application_compilee

# -------------------------------------------------------
# Templates Jinja2
# -------------------------------------------------------

- name: Deployer le fichier de configuration .env (Jinja2)
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ quiz_app_dir }}/.env"
    owner: "{{ quiz_service_user }}"
    group: "{{ quiz_service_user }}"
    mode: "0640"

- name: Deployer le service systemd avec Jinja2
  ansible.builtin.template:
    src: quiz-ansible.service.j2
    dest: /etc/systemd/system/quiz-ansible.service
    owner: root
    group: root
    mode: "0644"
  notify: reload_systemd

- name: Activer et demarrer le service quiz-ansible
  ansible.builtin.service:
    name: quiz-ansible
    enabled: true
    state: started

- name: Application disponible
  ansible.builtin.debug:
    msg: "quiz-ansible est disponible sur http://{{ ansible_default_ipv4.address }}:{{ quiz_app_port }}"
